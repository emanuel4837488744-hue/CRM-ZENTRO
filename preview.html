<section class="crm-open">

<style>
.crm-open {
    padding: 8rem 2rem;
    background: radial-gradient(circle at 20% 20%, rgba(91,76,218,0.08), transparent),
                #fff;
    text-align: center;
    perspective: 2000px;
}

/* TEXTO */
.crm-open h2 {
    color: #000;
    font-size: 2.8rem;
    font-weight: 800;
    margin-bottom: 1rem;
}

.crm-open p {
    color: #000;
    max-width: 600px;
    margin: 0 auto 4rem;
}

/* NOTEBOOK */
.laptop-wrap {
    width: 900px;
    max-width: 100%;
    margin: 0 auto;
    position: relative;
}

/* BASE */
.laptop-base {
    width: 100%;
    height: 20px;
    background: linear-gradient(to bottom, #ccc, #aaa);
    border-radius: 0 0 25px 25px;
}

/* TELA (INICIA FECHADA) */
.laptop-lid {
    width: 100%;
    transform-origin: bottom;
    transform: rotateX(90deg);
    transition: transform 1.5s cubic-bezier(.77,0,.18,1);
}

/* ABRINDO */
.crm-open.active .laptop-lid {
    transform: rotateX(0deg);
}

/* BORDA */
.screen-frame {
    background: #111;
    padding: 14px;
    border-radius: 18px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    position: relative;
}

/* REFLEXO */
.screen-frame::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 40%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.15), transparent);
    border-radius: 18px;
}

/* IMAGEM */
.screen-frame img {
    width: 100%;
    border-radius: 10px;
    opacity: 0;
    transition: opacity 0.8s ease;
}

/* APARECE DEPOIS DE ABRIR */
.crm-open.active img {
    opacity: 1;
}
</style>

<div class="container">

    <h2>CRM INTELIGENTE PARA O SEU NEGÓCIO</h2>
    <p>
        Veja na prática como funciona O sistema completo para organizar, atender e converter leads em clientes.
    </p>

    <div class="laptop-wrap">
        <div class="laptop-lid">
            <div class="screen-frame">
                <img id="crmOpen" src="img/crm1.png">
            </div>
        </div>
        <div class="laptop-base"></div>
    </div>

</div>

<script>
/* ABRIR AO ENTRAR NA TELA */
const section = document.querySelector('.crm-open');

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            section.classList.add('active');
        }
    });
}, { threshold: 0.4 });

observer.observe(section);

/* SLIDE DEPOIS DE ABRIR */
const imagens = [
    "img/crm1.png",
    "img/crm2.png",
    "img/crm3.png",
    "img/crm4.png"
];

let i = 0;
const img = document.getElementById("crmOpen");

setInterval(() => {
    if(!section.classList.contains("active")) return;

    i = (i + 1) % imagens.length;

    img.style.opacity = 0;

    setTimeout(() => {
        img.src = imagens[i];
        img.style.opacity = 1;
    }, 400);

}, 3500);
</script>

</section>
